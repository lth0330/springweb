# application.properties 파일은 항상 resource 폴더 바로 아래에 만든다.
# 목적 : 스프링 서버가 실행될 때 설정을 로딩하는 파일
# 주석은 #을 사용.
# 참고 : 상단 메뉴 -> 설정 -> 파일 인코딩 -> 프로퍼티 파일의 대한 디폴트 인코딩 : UTF-8로 변경

# 1. 내장 WAS PORT 번호 변경
sever.port = 8080

# 2. DAO 가 아닌 프로퍼티 파일에서 DB 연동이 가능하다. JDBC
# 2-1 연동할 db서버의 주소
#spring.datasource.url= jdbc:mysql://localhost:3306/practice5
spring.datasource.url= jdbc:mysql://localhost:3306/practice6
# 2-2 연동할 db서버의 계정
spring.datasource.username = root
spring.datasource.password = 1234


# 2-3 Entity 테이블 생성
spring.jpa.hibernate.ddl-auto=create

# 2-4 콘솔창에 실행된 sql 표시
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.fomat_sql=true

